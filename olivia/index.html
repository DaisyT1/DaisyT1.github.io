const $ = s => document.querySelector(s);
const results = $('#results');
const q = $('#q');
const count = $('#count');
const empty = $('#empty');
const quick = $('#quick');
const clearSearch = $('#clearSearch');
const quickTerms = ['bottle refusal','vitamin D','tongue tie','hypnobirthing','car seat','CMPA','sleep consultant','pumping','green poo'];
quickTerms.forEach(t => { const b=document.createElement('span'); b.className='chip'; b.textContent=t; b.onclick=()=>{ q.value=t; render(); }; quick.appendChild(b); });
function esc(s) { return (s||'').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m])); }
function terms(s) { return (s||'').toLowerCase().split(/[^a-z0-9]+/).filter(Boolean); }
function score(item, query) {
  if (!query) return 1;
  const qs = terms(query).filter(t => t.length > 1);
  const title = item.title.toLowerCase(), tags = item.search_tags.toLowerCase(), summary = item.summary.toLowerCase(), catg = item.category.toLowerCase();
  let s = 0;
  for (const t of qs) {
    if (title.includes(t)) s += 6;
    if (tags.includes(t)) s += 5;
    if (summary.includes(t)) s += 3;
    if (catg.includes(t)) s += 2;
  }
  if ((title+' '+tags+' '+summary+' '+catg).includes(query.toLowerCase())) s += 8;
  return s;
}
function escapeRegExp(s) {
  return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
}
function highlight(text, query) {
  let out = esc(text || '');
  const qs = [...new Set(terms(query).filter(t=>t.length>2))].slice(0,5);
  for (const t of qs) {
    out = out.replace(new RegExp('(' + escapeRegExp(t) + ')', 'ig'), '<mark>$1</mark>');
  }
  return out;
}
function formatDateUK(isoDate) {
  const [year, month, day] = (isoDate || '').split('-');
  return day && month && year ? `${day}/${month}/${year}` : esc(isoDate);
}
function card(d, query) {
  return `<article class="card">
    <div class="cardTop"><span class="category">${esc(d.category)}</span><span class="date">${formatDateUK(d.date)}</span></div>
    <h2>${highlight(d.title, query)}</h2>
    <p class="summary">${highlight(d.summary, query)}</p>
    <div class="actions"><a class="watch" href="${esc(d.instagram_url)}" target="_blank" rel="noreferrer">Watch on Instagram →</a><span class="confidence">${esc(d.confidence)} confidence</span></div>
  </article>`;
}
function render() {
  const query = q.value.trim();
  document.querySelectorAll('.chip').forEach(ch => ch.classList.toggle('active', ch.textContent === query));
  let arr = DATA.map(d => ({...d, _score: score(d, query)}))
    .filter(d => (!query || d._score > 0))
    .sort((a,b) => b._score - a._score || Number(a.rank) - Number(b.rank));
  results.innerHTML = arr.map(d => card(d, query)).join('');
  empty.style.display = arr.length ? 'none' : 'block';
  count.textContent = `${arr.length} video${arr.length===1?'':'s'} found${query ? ` for “${query}”` : ''}`;
  clearSearch.classList.toggle('visible', Boolean(query));
}
q.addEventListener('input', render);
clearSearch.onclick=()=>{ q.value=''; q.focus(); render(); };
render();
</script>
