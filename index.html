<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" href="images/flowerIcon2.png">
  <title>Daisy: web engineer</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    html,
    body {
      min-height: 100%;
    }

    body {
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: Helvetica, Arial, sans-serif;
      background: #eef7f5;
      color: #f7fffc;
    }

    .card {
      width: min(88vw, 520px);
      aspect-ratio: 1.72 / 1;
      background: #58A4B0;
      border-radius: 22px;
      box-shadow:
        0 28px 70px rgba(8, 75, 73, 0.22),
        0 2px 0 rgba(255, 255, 255, 0.22) inset;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 42px;
    }

    .flower {
      width: 54px;
      height: 54px;
      margin-bottom: 28px;
      opacity: 0.95;
    }

    .flower * {
      fill: none;
      stroke: #f7fffc;
      stroke-width: 2.1;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    h1 {
      font-size: clamp(38px, 7vw, 58px);
      font-weight: 300;
      letter-spacing: -0.04em;
      line-height: 1;
      margin-bottom: 18px;
    }

    .details {
      display: grid;
      gap: 8px;
      font-size: clamp(16px, 2.5vw, 20px);
      font-weight: 300;
      letter-spacing: 0.01em;
      color: rgba(247, 255, 252, 0.92);
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    @media (max-width: 520px) {
      .card {
        padding: 30px;
        border-radius: 18px;
      }

      .flower {
        width: 46px;
        height: 46px;
        margin-bottom: 22px;
      }
    }
  </style>
</head>
<body>
  <main class="card" aria-label="Daisy business card">
    <svg class="flower" viewBox="0 0 64 64" aria-hidden="true">
      <ellipse cx="32" cy="15" rx="8" ry="13" />
      <ellipse cx="32" cy="49" rx="8" ry="13" />
      <ellipse cx="15" cy="32" rx="13" ry="8" />
      <ellipse cx="49" cy="32" rx="13" ry="8" />
      <ellipse cx="20" cy="20" rx="7" ry="12" transform="rotate(-45 20 20)" />
      <ellipse cx="44" cy="20" rx="7" ry="12" transform="rotate(45 44 20)" />
      <ellipse cx="20" cy="44" rx="7" ry="12" transform="rotate(45 20 44)" />
      <ellipse cx="44" cy="44" rx="7" ry="12" transform="rotate(-45 44 44)" />
      <circle cx="32" cy="32" r="6" />
    </svg>

    <h1>Daisy</h1>

    <div class="details">
      <p>Software engineer</p>
      <p>London</p>
      <p><a href="mailto:hello@daisyt.co">hello@daisyt.co</a></p>
    </div>
  </main>
</body>
</html>
