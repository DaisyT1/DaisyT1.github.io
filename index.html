<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" href="images/flowerIcon2.png">
  <title>Daisy: web engineer</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    html,
    body {
      min-height: 100vh;
    }

    body {
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: Helvetica, Arial, sans-serif;
      background: #eef7f5;
      color: #f7fffc;
    }

    .card {
      width: min(88vw, 520px);
      aspect-ratio: 1.72 / 1;
      background: #FFA69E;
      border-radius: 22px;
      box-shadow:
        0 28px 70px rgba(8, 75, 73, 0.22),
        0 2px 0 rgba(255, 255, 255, 0.22) inset;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 42px;
    }

    .flower {
      width: 54px;
      height: 54px;
      margin-bottom: 28px;
      opacity: 0.95;
      object-fit: contain;
      display: block;
    }

    h1 {
      font-size: clamp(38px, 7vw, 58px);
      font-weight: 100;
      letter-spacing: -0.04em;
      line-height: 1;
      margin-bottom: 18px;
    }

    .details {
      display: grid;
      gap: 8px;
      font-size: clamp(16px, 2.5vw, 20px);
      font-weight: 300;
      letter-spacing: 0.01em;
      color: rgba(247, 255, 252, 0.92);
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    @media (max-width: 520px) {
      .card {
        padding: 30px;
        border-radius: 18px;
      }

      .flower {
        width: 46px;
        height: 46px;
        margin-bottom: 22px;
      }
    }
  </style>

</head>
<body>
  <main class="card" aria-label="Daisy business card">
    <img class="flower" src="./images/flowerIcon.png" alt="" aria-hidden="true" />

    <h1>Daisy</h1>

    <div class="details">
      <p>Software engineer</p>
      <p>London</p>
      <p>Email: <a href="mailto:hello@daisyt.co">hello@daisyt.co</a></p>
    </div>
  </main>
</body>
</html>
